name: ECR CKD Deploy
permissions:
  id-token: write
  contents: read

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image_tag:
        required: false
        type: string
        default: ""
      aws_account:
        required: false
        type: string
        default: "193044710768"
      aws_region:
        required: false
        type: string
        default: "us-east-1"
      environment:
        required: false
        type: string
        default: "uat"
      client:
        required: false
        type: string
        default: "scala"
      config_repo_ref:
        required: false
        type: string
        default: "main"
      stack:
        required: false
        type: string
        default: ""
        description: "Deploy a specific CDK stack (with --exclusively). If empty, deploys all stacks."
    secrets:
      GITHUB_PAT:
        required: false
      SCALA_ORG_RO_PAT:
        required: true

env:
  CDK_BOOTSTRAP_ACCOUNT: "579107446826"

jobs:
  ecr-ckd-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup shared CDK environment
        uses: scalaaiinc/workflow-templates/.github/actions/setup-cdk-env@main
        with:
          aws_region: ${{ inputs.aws_region }}
          cdk_bootstrap_account: ${{ env.CDK_BOOTSTRAP_ACCOUNT }}
          github_pat: ${{ secrets.GITHUB_PAT }}

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Merge client context config
        uses: scalaaiinc/workflow-templates/.github/actions/merge-client-config@main
        with:
          config_repo_ref: ${{ inputs.config_repo_ref }}
          client: ${{ inputs.client }}
          environment: ${{ inputs.environment }}
          service: ${{ inputs.service }}
          token: ${{ secrets.SCALA_ORG_RO_PAT }}

      - name: Set deploy variables
        shell: bash
        run: |
          echo "REPO_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ inputs.image_tag }}" >> $GITHUB_ENV
            echo "Using IMAGE_TAG=${{ inputs.image_tag }}"
          else
            echo "No image_tag provided — using configuration-based imageTag"
          fi

      - name: Install dependencies
        uses: scalaaiinc/workflow-templates/.github/actions/install-deps@main
        with:
          cdk_bootstrap_account: ${{ env.CDK_BOOTSTRAP_ACCOUNT }}
          aws_region: ${{ inputs.aws_region }}
          package_manager: uv

      - name: Configure AWS credentials for deployment account
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws_account }}:role/cdk-hnb659fds-github-role-${{ inputs.aws_account }}-${{ inputs.aws_region }}
          role-session-name: github-actions-cdk-deploy
          aws-region: ${{ inputs.aws_region }}

      - name: CDK Synth
        id: synth
        shell: bash
        run: |
          cd "$REPO_DIR"
          if [ -n "${{ inputs.stack }}" ]; then
            uv run cdk synth "${{ inputs.stack }}" --exclusively 2>&1 | tee synth.log
          else
            uv run cdk synth --all 2>&1 | tee synth.log
          fi
        env:
          CDK_ENVIRONMENT: ${{ inputs.client }}-${{ inputs.environment }}
          USE_SHARED_BOOTSTRAP: true
          UV_INDEX_SCALA_CODEARTIFACT_USERNAME: aws
          UV_INDEX_SCALA_CODEARTIFACT_PASSWORD: ${{ env.UV_INDEX_SCALA_CODEARTIFACT_PASSWORD }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: CDK List Stacks
        id: list
        shell: bash
        run: |
          cd "$REPO_DIR"
          uv run cdk list 2>&1 | tee -a synth.log
        env:
          CDK_ENVIRONMENT: ${{ inputs.client }}-${{ inputs.environment }}
          USE_SHARED_BOOTSTRAP: true
          UV_INDEX_SCALA_CODEARTIFACT_USERNAME: aws
          UV_INDEX_SCALA_CODEARTIFACT_PASSWORD: ${{ env.UV_INDEX_SCALA_CODEARTIFACT_PASSWORD }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: CDK Diff
        id: diff
        shell: bash
        run: |
          cd "$REPO_DIR"
          set +e
          if [ -n "${{ inputs.stack }}" ]; then
            uv run cdk diff "${{ inputs.stack }}" --exclusively 2>&1 | tee diff.log
          else
            uv run cdk diff --all 2>&1 | tee diff.log
          fi
          DIFF_EXIT_CODE=$?
          set -e

          if [ $DIFF_EXIT_CODE -eq 1 ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          elif [ $DIFF_EXIT_CODE -eq 0 ]; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "CDK diff failed with exit code $DIFF_EXIT_CODE"
            exit $DIFF_EXIT_CODE
          fi
        env:
          CDK_ENVIRONMENT: ${{ inputs.client }}-${{ inputs.environment }}
          USE_SHARED_BOOTSTRAP: true
          UV_INDEX_SCALA_CODEARTIFACT_USERNAME: aws
          UV_INDEX_SCALA_CODEARTIFACT_PASSWORD: ${{ env.UV_INDEX_SCALA_CODEARTIFACT_PASSWORD }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: CDK Deploy
        id: deploy
        shell: bash
        run: |
          cd "$REPO_DIR"
          if [ -n "${{ inputs.stack }}" ]; then
            uv run cdk deploy "${{ inputs.stack }}" --exclusively --require-approval never 2>&1 | tee deploy.log
          else
            uv run cdk deploy --all --require-approval never 2>&1 | tee deploy.log
          fi
        env:
          CDK_ENVIRONMENT: ${{ inputs.client }}-${{ inputs.environment }}
          USE_SHARED_BOOTSTRAP: true
          UV_INDEX_SCALA_CODEARTIFACT_USERNAME: aws
          UV_INDEX_SCALA_CODEARTIFACT_PASSWORD: ${{ env.UV_INDEX_SCALA_CODEARTIFACT_PASSWORD }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
