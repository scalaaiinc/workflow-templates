name: Node.js SPA Deploy

on:
  workflow_call:
    inputs:
      release_artifact:
        required: true
        type: string
        description: "Zip filename to deploy (e.g. 20260401T120000Z-a1b2c3d4-abc1234.zip)"
      archive_path:
        required: false
        type: string
        default: "releases"
        description: "S3 prefix where the release artifact lives (e.g. internal-releases, releases)"
      aws_account:
        required: false
        type: string
        default: "193044710768"
      aws_region:
        required: false
        type: string
        default: "us-east-1"
      spa_bucket:
        required: false
        type: string
        default: "scala-uat-voyager-spa-193044710768"
      cloudfront_distribution_id:
        required: false
        type: string
        default: ""
      client:
        required: false
        type: string
        default: "scala"
        description: "Client name for auth config generation (e.g. scala)"
      environment:
        required: false
        type: string
        default: "uat"
        description: "Environment name for auth config generation (e.g. uat)"
      context_file:
        required: false
        type: string
        default: ""
        description: "Path to merged cdk.context.json. If set, generates and uploads auth config."
      auth_config_bucket:
        required: false
        type: string
        default: ""
        description: "Target S3 bucket for auth config. If empty, derived from convention."
      config_repo_ref:
        required: false
        type: string
        default: "main"
        description: "Branch or tag of the client-configs-aws-cdk repo"
    secrets:
      SCALA_ORG_RO_PAT:
        required: false

permissions:
  id-token: write
  contents: read

env:
  AWS_ACCOUNT: ${{ inputs.aws_account }}
  AWS_REGION: ${{ inputs.aws_region }}
  SPA_BUCKET: ${{ inputs.spa_bucket }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ inputs.cloudfront_distribution_id }}
  ARCHIVE_PATH: ${{ inputs.archive_path }}
  RELEASE_ARTIFACT: ${{ inputs.release_artifact }}

jobs:
  deploy-spa:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/cdk-hnb659fds-github-role-${{ env.AWS_ACCOUNT }}-${{ env.AWS_REGION }}
          role-session-name: github-actions-spa-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Download and extract release artifact
        shell: bash
        run: |
          ARTIFACT_KEY="${ARCHIVE_PATH%/}/${RELEASE_ARTIFACT}"
          echo "📥 Downloading s3://${SPA_BUCKET}/${ARTIFACT_KEY}"
          mkdir -p /tmp/spa-release
          aws s3 cp "s3://${SPA_BUCKET}/${ARTIFACT_KEY}" /tmp/spa-release.zip
          unzip -q /tmp/spa-release.zip -d /tmp/spa-release
          rm -f /tmp/spa-release.zip

          # Auto-detect content root (index.html may be nested, e.g. client/index.html)
          INDEX_PATH=$(find /tmp/spa-release -name index.html -type f | head -n 1)
          if [ -z "$INDEX_PATH" ]; then
            echo "::error::index.html not found in the release artifact"
            exit 1
          fi
          CONTENT_ROOT=$(dirname "$INDEX_PATH")
          echo "Detected content root: $CONTENT_ROOT"
          echo "SPA_LOCAL_FOLDER=$CONTENT_ROOT" >> "$GITHUB_ENV"

      - name: Set deploy variables
        shell: bash
        run: |
          echo "DEPLOY_TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_ENV"

      - name: Checkout workflow-templates for shared actions
        uses: actions/checkout@v5
        with:
          repository: scalaaiinc/workflow-templates
          path: .workflow-templates

      - name: Check config secret availability
        id: config_check
        shell: bash
        run: |
          if [ -n "$CONFIG_PAT" ]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CONFIG_PAT: ${{ secrets.SCALA_ORG_RO_PAT }}

      - name: Merge client context config
        if: steps.config_check.outputs.has_pat == 'true'
        uses: ./.workflow-templates/.github/actions/merge-client-config
        with:
          config_repo_ref: ${{ inputs.config_repo_ref }}
          client: ${{ inputs.client }}
          environment: ${{ inputs.environment }}
          service: ${{ github.event.repository.name }}
          token: ${{ secrets.SCALA_ORG_RO_PAT }}

      - name: Deploy SPA to live
        uses: ./.workflow-templates/.github/actions/deploy-spa-to-live
        with:
          spa_local_folder: ${{ env.SPA_LOCAL_FOLDER }}
          spa_bucket: ${{ env.SPA_BUCKET }}
          release_artifact: ${{ env.RELEASE_ARTIFACT }}
          aws_region: ${{ env.AWS_REGION }}
          cloudfront_distribution_id: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}
          client: ${{ inputs.client }}
          environment: ${{ inputs.environment }}
          context_file: ${{ steps.config_check.outputs.has_pat == 'true' && format('{0}/cdk.context.json', github.workspace) || '' }}
          auth_config_bucket: ${{ inputs.auth_config_bucket }}

